name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20.19
          cache: yarn
          cache-dependency-path: yarn.lock

      - name: Enable Yarn 1
        run: |
          corepack enable
          corepack prepare yarn@1.22.22 --activate

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Type-check
        run: yarn typecheck

      - name: Lint
        run: yarn lint

      - name: Test
        run: yarn test

      - name: Verify Flickr API key secret
        run: |
          if [ -z "$VITE_FLICKR_API_KEY" ]; then
            echo "VITE_FLICKR_API_KEY repository secret is not set." >&2
            exit 1
          fi
        env:
          VITE_FLICKR_API_KEY: ${{ secrets.VITE_FLICKR_API_KEY }}

      - name: Build
        run: yarn build
        env:
          VITE_FLICKR_API_KEY: ${{ secrets.VITE_FLICKR_API_KEY }}

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
